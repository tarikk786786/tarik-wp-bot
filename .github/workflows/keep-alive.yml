name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Endpoint
        run: |
          if [ -n "${{ secrets.RENDER_URL }}" ]; then
            curl -sSf "${{ secrets.RENDER_URL }}/api/health" || echo "Failed to ping"
          else
            echo "RENDER_URL secret is not set. Please set it to your Render web service URL (e.g., https://your-app.onrender.com)."
          fi
