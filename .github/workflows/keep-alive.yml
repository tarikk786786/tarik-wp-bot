name: Keep Render App Alive

on:
  schedule:
    # Runs every 10 minutes to prevent the free Render instance from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend API
        run: |
          curl -sS "https://tarik-wp-bot.onrender.com/api/status" > /dev/null
          echo "Ping successful!"
