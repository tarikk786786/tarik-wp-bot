name: Keep Render App Alive

on:
  schedule:
    # Runs every 10 minutes to prevent the free Render instance from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend API
        run: |
          if [ -z "${{ secrets.RENDER_API_URL }}" ]; then
            echo "RENDER_API_URL secret is not set. Please set it in your repository secrets to enable the keep-alive ping."
            exit 0
          fi
          
          # Ping the status endpoint
          curl -sS "${{ secrets.RENDER_API_URL }}/api/status" > /dev/null
          echo "Ping successful!"
