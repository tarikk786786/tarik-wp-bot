services:
  - type: web
    name: whatsapp-bot
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VERCEL
        value: "0"
      - key: SESSION_PATH
        value: "/baileys_auth_info"
    disk:
      name: session-data
      mountPath: /baileys_auth_info
      sizeGB: 1
